# Snippet for OpenCTI admins: paste this `connector-whisper` service into
# your existing OpenCTI docker-compose to register the Whisper connector.
# For local development, use docker-compose.dev.yml instead.
#
# Variables with a built-in default are commented out (upstream convention):
# uncomment them only to override the default.

services:
  connector-whisper:
    image: whisper-sec/whisper-opencti:latest
    restart: unless-stopped
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_ID}
      #- CONNECTOR_LOG_LEVEL=error
      #- CONNECTOR_NAME=Whisper
      #- CONNECTOR_SCOPE=IPv4-Addr,IPv6-Addr,Domain-Name,Autonomous-System
      #- CONNECTOR_AUTO=false # Enable/disable auto-enrichment of observables
      - WHISPER_API_URL=${WHISPER_API_URL}
      - WHISPER_API_KEY=${WHISPER_API_KEY}
      #- WHISPER_MAX_TLP=TLP:AMBER+STRICT

  # OPTIONAL - agent-activity LOG SOURCE (EXTERNAL_IMPORT sibling).
  # A second connector on the SAME image + Whisper key that periodically pulls
  # this tenant's own agent activity (DNS / egress / allocation) into OpenCTI
  # as STIX. Uncomment to enable; give it its own CONNECTOR_ID.
  # connector-whisper-logs:
  #   image: whisper-sec/whisper-opencti:latest
  #   command: ["python", "-m", "src.main_logs"]
  #   restart: unless-stopped
  #   environment:
  #     - OPENCTI_URL=${OPENCTI_URL}
  #     - OPENCTI_TOKEN=${OPENCTI_TOKEN}
  #     - CONNECTOR_ID=${CONNECTOR_LOGS_ID}       # DISTINCT uuid from the one above
  #     - CONNECTOR_TYPE=EXTERNAL_IMPORT
  #     - CONNECTOR_NAME=Whisper Agent Activity
  #     - CONNECTOR_SCOPE=whisper-agent-activity
  #     - CONNECTOR_DURATION_PERIOD=PT5M
  #     - WHISPER_API_URL=${WHISPER_API_URL}
  #     - WHISPER_API_KEY=${WHISPER_API_KEY}
  #     #- WHISPER_LOGS_INITIAL_LOOKBACK=-24h
  #     #- WHISPER_LOGS_AGENT=a98874349306a52c8   # optional single-agent filter
  #     #- WHISPER_LOGS_BATCH_LIMIT=1000

# PR conventions checks — upstream CI parity (issue #89).
#
# Mirrors OpenCTI-Platform/connectors .github/workflows/gh-pr-check-conventions.yml.
# Adaptations for this single-connector repo:
#   - "check-organization" job SKIPPED: it uses FiligranHQ/auto-label to tag PRs from
#     the FiligranHQ org ("filigran team" label) — Filigran-specific, not applicable here.
#   - "check-pr-issue" is NON-BLOCKING here (continue-on-error: true + step-summary note);
#     upstream treats it as a blocking check, but internal PRs don't always have issues.
#   - Permissions trimmed to the minimum each job needs (pull-requests: write kept only
#     where the 1Password signed-commits action may comment; checks: write kept for the
#     pr-title-check action, which creates a check run).
#   - Triggers unchanged from upstream (pull_request only — upstream uses no path filters
#     in this workflow, and every job reads github.event.pull_request).
# Third-party actions pinned exactly as upstream pins them:
#   - 1Password/check-signed-commits-action@v1
#   - FiligranHQ/filigran-ci-tools/actions/pr-title-check@main (conventional-commit
#     types feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert, optional
#     scope, optional "!", trailing issue reference "(#123)" required unless "(deps)").
name: PR conventions checks
on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]
jobs:
  check-signed-commits:
    name: Check signed commits in PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Information about how to sign commits see https://docs.github.com/en/authentication/managing-commit-signature-verification/signing-commits
        # "with comment" below does not work for forks.
        run: |
          echo "If you need to sign commits, Please see https://docs.github.com/en/authentication/managing-commit-signature-verification/signing-commits"
      - name: Check signed commits in PR on fail see above information.
        uses: 1Password/check-signed-commits-action@v1
        with:
          comment: |
            Thank you for your contribution, but we need you to sign your commits. Please see https://docs.github.com/en/authentication/managing-commit-signature-verification/signing-commits
  check-pr-issue:
    name: Check Pull Request is linked to an issue
    # Upstream runs this as a BLOCKING check. It is advisory here (continue-on-error)
    # because internal PRs don't always reference an issue.
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'dependencies') }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check for linked issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Get PR details including linked issues
          LINKED_ISSUES=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json closingIssuesReferences --jq '.closingIssuesReferences | length')

          if [ "$LINKED_ISSUES" -eq 0 ]; then
            echo "::error::No linked issues found. Please link at least one issue to this Pull Request."
            echo "You can link an issue by using keywords like 'Fixes #123', 'Closes #123', or 'Resolves #123' in the PR description."
            exit 1
          else
            echo "✓ Found $LINKED_ISSUES linked issue(s)"
          fi
      - name: Note that this check is non-blocking in this repo
        if: failure()
        run: |
          {
            echo "### Linked-issue check (non-blocking)"
            echo ""
            echo "No linked issue was found on this PR. Upstream (OpenCTI-Platform/connectors)"
            echo "treats this check as blocking; in this repo it is advisory because internal"
            echo "PRs don't always have an associated issue. Link one with 'Fixes #123' /"
            echo "'Closes #123' / 'Resolves #123' in the PR description when applicable."
          } >> "$GITHUB_STEP_SUMMARY"
  check-pr-title-convention:
    name: Check that PR title follows convention
    if: ${{ github.event.pull_request.user.login != 'renovate[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Validate PR title and create check
        uses: FiligranHQ/filigran-ci-tools/actions/pr-title-check@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

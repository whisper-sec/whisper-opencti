# Dev flavour: builds connector-whisper from the local Dockerfile.
# Compose this with docker-compose.base.yml — the Makefile's dev-* targets
# pass both files. The base file provides the OpenCTI stack; this file
# adds the connector itself.

services:
  connector-whisper:
    build:
      context: .
      dockerfile: Dockerfile
    image: whisper-sec/whisper-opencti:dev
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_ID}
      - CONNECTOR_TYPE=INTERNAL_ENRICHMENT
      - CONNECTOR_NAME=Whisper
      - CONNECTOR_SCOPE=IPv4-Addr,IPv6-Addr,Domain-Name
      - CONNECTOR_AUTO=false
      - CONNECTOR_LOG_LEVEL=info
      - WHISPER_API_URL=${WHISPER_API_URL}
      - WHISPER_API_KEY=${WHISPER_API_KEY}
    depends_on:
      - opencti